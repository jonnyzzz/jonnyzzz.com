<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 280" role="img" aria-label="One devrig bridge connects your AI Agent to all running IDEs at once" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8.5" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 z" fill="#a99dff"/></marker>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6B57FF"/><stop offset="1" stop-color="#FE2857"/></linearGradient>
  </defs>
  <rect x="1" y="1" width="778" height="278" rx="14" fill="#1b1b34" stroke="#2e2e50" stroke-width="1.5"/>
  <text x="560" y="32" text-anchor="middle" fill="#c7c4d6" font-size="13">discovers &amp; routes to all running IDEs at once</text>
  <!-- AI Agent -->
  <rect x="24" y="105" width="180" height="82" rx="10" fill="#1f1f3a" stroke="#4a4a72"/>
  <text x="114" y="139" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">AI Agent</text>
  <text x="114" y="163" text-anchor="middle" fill="#c7c4d6" font-size="12">Claude · Codex · Gemini · …</text>
  <!-- agent -> devrig -->
  <line x1="204" y1="146" x2="314" y2="146" stroke="#a99dff" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="259" y="136" text-anchor="middle" fill="#c7c4d6" font-size="12.5">CLI · MCP</text>
  <!-- devrig -->
  <rect x="320" y="99" width="150" height="94" rx="10" fill="#1f1f3a" stroke="url(#brand)" stroke-width="3"/>
  <text x="395" y="133" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">devrig</text>
  <text x="395" y="157" text-anchor="middle" fill="#c7c4d6" font-size="12.5">CLI + MCP bridge</text>
  <text x="395" y="176" text-anchor="middle" fill="#c7c4d6" font-size="12.5">→ every IDE</text>
  <!-- IDEs -->
  <rect x="556" y="40" width="200" height="64" rx="10" fill="#1f1f3a" stroke="#4a4a72"/>
  <text x="656" y="69" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">IntelliJ IDEA</text>
  <text x="656" y="90" text-anchor="middle" fill="#c7c4d6" font-size="12.5">project A</text>
  <rect x="556" y="114" width="200" height="64" rx="10" fill="#1f1f3a" stroke="#4a4a72"/>
  <text x="656" y="143" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">PyCharm</text>
  <text x="656" y="164" text-anchor="middle" fill="#c7c4d6" font-size="12.5">project B</text>
  <rect x="556" y="188" width="200" height="64" rx="10" fill="#1f1f3a" stroke="#4a4a72" stroke-dasharray="4 3"/>
  <text x="656" y="217" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">Managed backend</text>
  <text x="656" y="238" text-anchor="middle" fill="#c7c4d6" font-size="12.5">started by devrig</text>
  <!-- devrig -> IDEs -->
  <path d="M470,126 C520,96 526,76 554,73" fill="none" stroke="#a99dff" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="470" y1="146" x2="554" y2="146" stroke="#a99dff" stroke-width="2.5" marker-end="url(#arr)"/>
  <path d="M470,166 C520,196 526,216 554,219" fill="none" stroke="#a99dff" stroke-width="2.5" marker-end="url(#arr)"/>
</svg>
