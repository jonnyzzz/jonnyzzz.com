<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 210" role="img" aria-label="MCP Steroid's arc: the in-IDE plugin, then devrig the bridge, then remote IDE fleets" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="11" markerHeight="11" refX="8.5" refY="5.5" orient="auto"><path d="M0,0 L11,5.5 L0,11 z" fill="#a99dff"/></marker>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6B57FF"/><stop offset="1" stop-color="#FE2857"/></linearGradient>
  </defs>
  <rect x="1" y="1" width="778" height="208" rx="14" fill="#1b1b24"/>
  <text x="390" y="34" text-anchor="middle" fill="#9a9aa8" font-size="14">From an in-IDE plugin, to one bridge, to remote fleets</text>

  <rect x="28" y="74" width="200" height="84" rx="12" fill="#23232e" stroke="#3a3a48"/>
  <text x="128" y="108" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">MCP Steroid</text>
  <text x="128" y="131" text-anchor="middle" fill="#b9b9c6" font-size="12">the full IntelliJ,</text>
  <text x="128" y="147" text-anchor="middle" fill="#b9b9c6" font-size="12">given to one agent</text>
  <text x="128" y="184" text-anchor="middle" fill="#6f6f7e" font-size="11">the foundation</text>

  <line x1="232" y1="116" x2="286" y2="116" stroke="#a99dff" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="290" y="74" width="200" height="84" rx="12" fill="#23232e" stroke="url(#brand)" stroke-width="2.5"/>
  <text x="390" y="108" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="bold">devrig</text>
  <text x="390" y="131" text-anchor="middle" fill="#b9b9c6" font-size="12">one bridge to every IDE,</text>
  <text x="390" y="147" text-anchor="middle" fill="#b9b9c6" font-size="12">autonomous lifecycle</text>
  <text x="390" y="184" text-anchor="middle" fill="#a99dff" font-size="11">Level 3 — here today</text>

  <line x1="494" y1="116" x2="548" y2="116" stroke="#a99dff" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>

  <rect x="550" y="74" width="200" height="84" rx="12" fill="#1f1f29" stroke="#4a4a5a" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="650" y="108" text-anchor="middle" fill="#e6e6ee" font-size="18" font-weight="bold">Remote &amp; fleets</text>
  <text x="650" y="131" text-anchor="middle" fill="#909090" font-size="12">many agents, many</text>
  <text x="650" y="147" text-anchor="middle" fill="#909090" font-size="12">machines</text>
  <text x="650" y="184" text-anchor="middle" fill="#6f6f7e" font-size="11">what's next</text>
</svg>
